<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ProHeat Sports</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.paypal.com/sdk/js?client-id=AXLPKxFE2iHKD4lExlFg0WPz8g1tXS9rd8ZPkkD1lils-wNbhfFKCSIQP46p1_-OLhRQ_ceDDu1VPRhP&currency=MXN"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:white;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.btn{
  background:orange;
  color:black;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:none;
}

.card{
  background:#111;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

.hidden{
  display:none;
}

.message{
  margin-top:12px;
  padding:12px 14px;
  border-radius:10px;
  background:#1a1a1a;
  border:1px solid #333;
  white-space:pre-wrap;
  line-height:1.5;
}

.success{
  border-color:#1f7a3a;
  color:#9cffb5;
}

.error{
  border-color:#8b2c2c;
  color:#ffaaaa;
}

.warning{
  border-color:#8a6a1d;
  color:#ffd27a;
}
</style>
</head>

<body>

<div class="container">

  <h1>🔥 ProHeat Sports</h1>

  <!-- LOGIN -->
  <div class="card" id="loginBox">
    <h2>Iniciar sesión</h2>
    <input type="email" id="email" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">
    <button class="btn" onclick="login()">Entrar</button>
    <div id="loginMessage" class="message hidden"></div>
  </div>

  <!-- USUARIO -->
  <div class="card hidden" id="userBox">
    <h2>Bienvenido</h2>
    <p id="userInfo"></p>

    <h3>Premium 30 días - $110 MXN</h3>

    <div id="paypal-button-container"></div>
    <div id="paypalMessage" class="message hidden"></div>

    <button class="btn" onclick="logout()">Cerrar sesión</button>
  </div>

</div>

<script>
const API = window.location.origin;

function showMessage(id, text, type = "warning"){
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = `message ${type}`;
  el.classList.remove("hidden");
}

function hideMessage(id){
  const el = document.getElementById(id);
  el.textContent = "";
  el.className = "message hidden";
}

function saveToken(token){
  localStorage.setItem("token", token);
}

function getToken(){
  return localStorage.getItem("token");
}

function logout(){
  localStorage.removeItem("token");
  location.reload();
}

async function login(){
  hideMessage("loginMessage");

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    showMessage("loginMessage", "Ingresa correo y contraseña.", "error");
    return;
  }

  try {
    const res = await fetch(API + "/login", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if(!res.ok){
      showMessage("loginMessage", data.detail || "No se pudo iniciar sesión.", "error");
      return;
    }

    saveToken(data.token);

    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("userBox").classList.remove("hidden");

    document.getElementById("userInfo").innerText =
      `${data.name} (${data.status})`;

    initPayPal();
  } catch (error) {
    showMessage("loginMessage", "Error de conexión al iniciar sesión.", "error");
  }
}

function initPayPal(){
  hideMessage("paypalMessage");

  const token = getToken();
  if (!token) {
    showMessage("paypalMessage", "No hay sesión activa. Inicia sesión nuevamente.", "error");
    return;
  }

  const container = document.getElementById("paypal-button-container");
  container.innerHTML = "";

  paypal.Buttons({

    createOrder: async function(){
      try {
        showMessage("paypalMessage", "Creando orden PayPal...", "warning");

        const res = await fetch(API + "/paypal/create-order", {
          method:"POST",
          headers:{
            "Authorization":"Bearer " + getToken()
          }
        });

        const data = await res.json();

        if(!res.ok){
          const detail = data?.detail || JSON.stringify(data);
          showMessage("paypalMessage", "Error creando orden:\n" + detail, "error");
          throw new Error(detail);
        }

        showMessage("paypalMessage", "Orden PayPal creada correctamente.", "success");
        return data.id;
      } catch (error) {
        console.error("createOrder error:", error);
        showMessage("paypalMessage", "Error creando orden:\n" + (error?.message || error), "error");
        throw error;
      }
    },

    onApprove: async function(data){
      try {
        showMessage("paypalMessage", "Capturando pago y activando membresía...", "warning");

        const res = await fetch(API + "/paypal/capture-order/" + data.orderID, {
          method:"POST",
          headers:{
            "Authorization":"Bearer " + getToken()
          }
        });

        const result = await res.json();

        if (!res.ok) {
          showMessage(
            "paypalMessage",
            "Error capturando pago:\n" + (result?.detail || JSON.stringify(result)),
            "error"
          );
          return;
        }

        if(result.status === "ok"){
          showMessage("paypalMessage", "✅ Pago exitoso. Membresía activada.", "success");
          setTimeout(() => location.reload(), 1200);
        } else {
          showMessage(
            "paypalMessage",
            "⚠️ Pago no completado:\n" + (result?.message || "Sin detalle."),
            "warning"
          );
        }
      } catch (error) {
        console.error("captureOrder error:", error);
        showMessage("paypalMessage", "Error capturando pago:\n" + (error?.message || error), "error");
      }
    },

    onCancel: function(){
      showMessage("paypalMessage", "Pago cancelado por el usuario.", "warning");
    },

    onError: function(err){
      console.error("PayPal onError:", err);
      showMessage(
        "paypalMessage",
        "❌ Error en PayPal:\n" + (err?.message || err?.toString?.() || "Sin detalle."),
        "error"
      );
    }

  }).render("#paypal-button-container");
}

function checkSession(){
  const token = getToken();

  if(!token) return;

  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("userBox").classList.remove("hidden");

  showMessage("paypalMessage", "Sesión restaurada. Listo para pagar.", "success");
  initPayPal();
}

checkSession();
</script>

</body>
</html>
