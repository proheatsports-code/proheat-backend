<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ProHeat Sports</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.paypal.com/sdk/js?client-id=AXLPKxFE2iHKD4lExlFg0WPz8g1tXS9rd8ZPkkD1lils-wNbhfFKCSIQP46p1_-OLhRQ_ceDDu1VPRhP&currency=MXN"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:white;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.btn{
  background:orange;
  color:black;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:none;
}

.card{
  background:#111;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<div class="container">

  <h1>🔥 ProHeat Sports</h1>

  <!-- LOGIN -->
  <div class="card" id="loginBox">
    <h2>Iniciar sesión</h2>
    <input type="email" id="email" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">
    <button class="btn" onclick="login()">Entrar</button>
  </div>

  <!-- USUARIO -->
  <div class="card hidden" id="userBox">
    <h2>Bienvenido</h2>
    <p id="userInfo"></p>

    <h3>Premium 30 días - $110 MXN</h3>

    <div id="paypal-button-container"></div>

    <button class="btn" onclick="logout()">Cerrar sesión</button>
  </div>

</div>

<script>

const API = window.location.origin;

function saveToken(token){
  localStorage.setItem("token", token);
}

function getToken(){
  return localStorage.getItem("token");
}

function logout(){
  localStorage.removeItem("token");
  location.reload();
}

async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch(API + "/login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if(!res.ok){
    alert(data.detail);
    return;
  }

  saveToken(data.token);

  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("userBox").classList.remove("hidden");

  document.getElementById("userInfo").innerText =
    data.name + " (" + data.status + ")";

  initPayPal();
}

function initPayPal(){

  paypal.Buttons({

    createOrder: async function(){

      const res = await fetch(API + "/paypal/create-order", {
        method:"POST",
        headers:{
          "Authorization":"Bearer " + getToken()
        }
      });

      const data = await res.json();

      if(!res.ok){
        alert("Error creando orden");
        throw new Error();
      }

      return data.id;
    },

    onApprove: async function(data){

      const res = await fetch(API + "/paypal/capture-order/" + data.orderID, {
        method:"POST",
        headers:{
          "Authorization":"Bearer " + getToken()
        }
      });

      const result = await res.json();

      if(result.status === "ok"){
        alert("✅ Pago exitoso. Membresía activada.");
        location.reload();
      }else{
        alert("⚠️ Pago no completado");
      }
    },

    onError: function(err){
      console.error(err);
      alert("❌ Error en PayPal");
    }

  }).render("#paypal-button-container");
}

function checkSession(){
  const token = getToken();

  if(!token) return;

  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("userBox").classList.remove("hidden");

  initPayPal();
}

checkSession();

</script>

</body>
</html>
