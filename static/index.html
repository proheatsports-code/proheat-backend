<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ProHeat Sports</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:white;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  border-bottom:1px solid rgba(255,165,0,0.2);
}

.right-menu{
  display:flex;
  gap:10px;
  align-items:center;
}

.btn{
  background:#111;
  border:1px solid orange;
  color:white;
  padding:8px 15px;
  border-radius:20px;
  cursor:pointer;
}

.btn.active{
  background:orange;
  color:black;
}

/* LOGIN DROPDOWN */
.login-box{
  position:absolute;
  right:20px;
  top:70px;
  background:#111;
  border:1px solid orange;
  border-radius:10px;
  padding:15px;
  display:none;
  width:250px;
}

.login-box input{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border-radius:8px;
  border:none;
  background:#222;
  color:white;
}

.login-box button{
  width:100%;
  padding:10px;
  border:none;
  background:orange;
  color:black;
  border-radius:20px;
  cursor:pointer;
}

.login-box a{
  color:orange;
  font-size:12px;
  cursor:pointer;
}

/* USER DROPDOWN */
.user-menu{
  position:relative;
}

.user-dropdown{
  position:absolute;
  right:0;
  top:40px;
  background:#111;
  border:1px solid orange;
  border-radius:10px;
  display:none;
}

.user-dropdown button{
  background:none;
  border:none;
  color:white;
  padding:10px;
  cursor:pointer;
  width:100%;
}

.user-dropdown button:hover{
  color:orange;
}

.container{
  padding:20px;
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <div>🔥 <b>PROHEAT SPORTS</b></div>

  <div class="right-menu">

    <!-- LOGIN / USER -->
    <div id="authArea"></div>

    <!-- TRADUCCIÓN -->
    <button class="btn active">ES</button>
    <button class="btn">EN</button>

  </div>
</div>

<!-- LOGIN DROPDOWN -->
<div id="loginBox" class="login-box">
  <h3>Iniciar sesión</h3>
  <input type="text" id="email" placeholder="Correo">
  <input type="password" id="password" placeholder="Contraseña">
  <button onclick="login()">Entrar</button>

  <br><br>
  <a onclick="goToRegister()">¿No tienes cuenta? Crear cuenta</a>
</div>

<div class="container">
  <h1>Predicciones deportivas con estructura centralizada</h1>
</div>

<script>

// =========================
// INIT
// =========================
window.onload = function(){
  checkSession();
}

// =========================
// CHECK SESSION
// =========================
function checkSession(){
  const user = localStorage.getItem("user_name");

  if(user){
    showUser(user);
  }else{
    showLoginButton();
  }
}

// =========================
// SHOW LOGIN BUTTON
// =========================
function showLoginButton(){
  document.getElementById("authArea").innerHTML = `
    <button class="btn" onclick="toggleLogin()">Iniciar sesión</button>
  `;
}

// =========================
// SHOW USER
// =========================
function showUser(name){
  document.getElementById("authArea").innerHTML = `
    <div class="user-menu">
      <button class="btn" onclick="toggleUserMenu()">Hola, ${name}</button>

      <div id="userDropdown" class="user-dropdown">
        <button onclick="logout()">Cerrar sesión</button>
      </div>
    </div>
  `;
}

// =========================
// TOGGLE LOGIN
// =========================
function toggleLogin(){
  const box = document.getElementById("loginBox");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

// =========================
// LOGIN (SIMULADO)
// =========================
function login(){
  const email = document.getElementById("email").value;

  if(!email){
    alert("Ingresa correo");
    return;
  }

  // SIMULACIÓN
  localStorage.setItem("user_name", "Carlos");
  localStorage.setItem("user_id", "user_123");

  location.reload();
}

// =========================
// LOGOUT
// =========================
function logout(){
  localStorage.removeItem("user_name");
  localStorage.removeItem("user_id");

  location.reload();
}

// =========================
// USER MENU
// =========================
function toggleUserMenu(){
  const menu = document.getElementById("userDropdown");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

// =========================
// REGISTER
// =========================
function goToRegister(){
  window.location.href = "/premium";
}

</script>

</body>
</html>
